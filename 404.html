
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.7)),
url("background.webp");
background-size:cover;
background-position:center;
overflow:hidden;
}

/* Floating Blur */

body::before{
content:"";
position:absolute;
width:500px;
height:500px;
background:#ff4d00;
filter:blur(180px);
opacity:.25;
top:-150px;
left:-100px;
animation:float1 8s ease-in-out infinite;
}

body::after{
content:"";
position:absolute;
width:400px;
height:400px;
background:#2563eb;
filter:blur(180px);
opacity:.2;
bottom:-100px;
right:-100px;
animation:float2 8s ease-in-out infinite;
}

/* Glass Card */

.container{
position:relative;
z-index:2;
text-align:center;
padding:60px;
width:90%;
max-width:700px;

background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,0.15);
border-radius:30px;

box-shadow:
0 8px 32px rgba(0,0,0,.35);

animation:cardIn 1.2s ease;
}

/* 404 Animation */

.error{
font-size:180px;
font-weight:900;
color:white;
line-height:1;

opacity:0;
transform:scale(0) rotate(-10deg);

animation:errorIn 1s ease forwards;
animation-delay:.3s;

text-shadow:
0 0 20px rgba(255,77,0,.8),
0 0 40px rgba(255,77,0,.5);
}

h2{
font-size:38px;
margin-top:15px;
margin-bottom:15px;
opacity:0;
animation:fadeUp .8s ease forwards;
animation-delay:1s;
}

p{
font-size:18px;
line-height:1.8;
color:#ddd;
margin-bottom:30px;

opacity:0;
animation:fadeUp .8s ease forwards;
animation-delay:1.3s;
}

.btn{
display:inline-block;
padding:14px 35px;
background:#ff4d00;
color:white;
text-decoration:none;
border-radius:40px;
font-weight:600;
transition:.4s;

opacity:0;
animation:fadeUp .8s ease forwards;
animation-delay:1.6s;
}

.btn:hover{
transform:translateY(-5px);
box-shadow:0 10px 30px rgba(255,77,0,.5);
}

/* Animations */

@keyframes errorIn{
to{
opacity:1;
transform:scale(1) rotate(0deg);
}
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes cardIn{
from{
opacity:0;
transform:translateY(80px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes float1{
50%{
transform:translateY(50px);
}
}

@keyframes float2{
50%{
transform:translateY(-50px);
}
}

@media(max-width:768px){

.error{
font-size:120px;
}

h2{
font-size:28px;
}

p{
font-size:16px;
}

.container{
padding:40px 25px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="error">404</div>

<h2>Oops! Page Not Found</h2>

<p>
The page you are looking for doesn't exist
or has been moved.
</p>

<a href="index.html" class="btn">
Back To Home
</a>

</div>

</body>
</html>
